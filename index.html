<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BlackBox Hospital — Simulateur de crise</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0392B;--red-light:#FDECEA;--red-mid:#F5B7B1;
  --amber:#E67E22;--amber-light:#FEF5EC;--amber-mid:#FAD7A0;
  --blue:#2471A3;--blue-light:#EBF5FB;--blue-mid:#A9CCE3;
  --green:#1E8449;--green-light:#EAFAF1;--green-mid:#A9DFBF;
  --purple:#7D3C98;--purple-light:#F5EEF8;--purple-mid:#D2B4DE;
  --orange:#D35400;--orange-light:#FBEEE6;--orange-mid:#F0B27A;
  --bg:#F4F6F8;--surface:#FFFFFF;--surface2:#F8F9FA;
  --border:#E0E4E8;--border2:#C8CDD4;
  --text:#1A1D23;--text2:#4A5568;--text3:#8898AA;
  --shadow:0 2px 8px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:16px}
.wrap{max-width:680px;margin:0 auto}
.brand{text-align:center;padding:24px 0 20px}
.brand-badge{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;padding:6px 16px;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.08em;margin-bottom:14px}
.brand-dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.brand-title{font-family:'Space Mono',monospace;font-size:clamp(26px,5vw,40px);font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1.1;margin-bottom:6px}
.brand-title span{color:var(--red)}
.brand-sub{font-size:14px;color:var(--text3);font-weight:400}
.status-bar{background:var(--text);border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.status-left{display:flex;flex-direction:column;gap:4px}
.status-role{font-size:15px;font-weight:700;color:#fff;font-family:'Space Mono',monospace;letter-spacing:0.02em}
.status-scenario{font-size:11px;color:#8898AA;font-family:'Space Mono',monospace;letter-spacing:0.04em}
.status-clock{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:#E74C3C;letter-spacing:0.05em}
.gauges{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:500px){.gauges{grid-template-columns:repeat(4,1fr)}}
.gauge{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.gauge-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.gauge-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px}
.gauge-track{height:5px;background:var(--border);border-radius:3px}
.gauge-fill{height:5px;border-radius:3px;transition:width 0.6s ease}
.log{background:var(--text);border-radius:12px;padding:16px;margin-bottom:14px;min-height:100px;max-height:140px;overflow-y:auto;box-shadow:var(--shadow-lg)}
.log::-webkit-scrollbar{width:3px}
.log::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
.log-line{font-family:'Space Mono',monospace;font-size:11px;line-height:2;color:#8898AA}
.log-line.alert{color:#E74C3C}
.log-line.warn{color:#F39C12}
.log-line.ok{color:#27AE60}
.log-line.info{color:#3498DB}
.progress{display:flex;gap:5px;margin-bottom:12px}
.prog-step{height:5px;flex:1;border-radius:3px;background:var(--border)}
.prog-step.done{background:var(--blue)}
.prog-step.current{background:var(--red)}
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.event-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.event-tag{font-size:11px;font-weight:700;padding:5px 12px;border-radius:100px;letter-spacing:0.06em;font-family:'Space Mono',monospace}
.tag-red{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid)}
.tag-amber{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-mid)}
.tag-blue{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-mid)}
.tag-purple{background:var(--purple-light);color:var(--purple);border:1px solid var(--purple-mid)}
.tag-orange{background:var(--orange-light);color:var(--orange);border:1px solid var(--orange-mid)}
.event-text{font-size:15px;color:var(--text);line-height:1.8;margin-bottom:20px;white-space:pre-line;font-weight:400}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{text-align:left;padding:16px 18px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);cursor:pointer;line-height:1.6;transition:all 0.18s}
.choice-btn:hover:not(:disabled){background:#fff;border-color:var(--blue);color:var(--text);box-shadow:0 4px 16px rgba(36,113,163,0.12);transform:translateY(-1px)}
.choice-btn:active:not(:disabled){transform:translateY(0)}
.choice-btn:disabled{opacity:0.4;cursor:default;transform:none}
.choice-letter{display:inline-block;width:26px;height:26px;border-radius:8px;background:var(--border);text-align:center;line-height:26px;font-size:12px;font-weight:700;margin-right:10px;font-family:'Space Mono',monospace;vertical-align:middle;flex-shrink:0}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.role-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;text-align:left;transition:all 0.18s;box-shadow:var(--shadow)}
.role-card:hover{border-color:var(--blue);box-shadow:0 8px 24px rgba(36,113,163,0.14);transform:translateY(-2px)}
.role-card:active{transform:translateY(0)}
.role-icon{font-size:28px;margin-bottom:10px;display:block}
.role-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.role-desc{font-size:12px;color:var(--text3);line-height:1.5}
.scen-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.scen-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:all 0.18s;box-shadow:var(--shadow)}
.scen-card:hover{border-color:var(--blue);box-shadow:0 6px 20px rgba(36,113,163,0.12);transform:translateY(-1px)}
.scen-card:active{transform:translateY(0)}
.scen-name{font-size:15px;font-weight:600;color:var(--text)}
.scen-sub{font-size:12px;color:var(--text3);margin-top:2px}
.end-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:var(--shadow-lg)}
.end-score-wrap{display:flex;align-items:flex-end;gap:8px;margin:16px 0}
.end-score{font-family:'Space Mono',monospace;font-size:56px;font-weight:700;line-height:1}
.end-score-sub{font-size:18px;color:var(--text3);margin-bottom:8px;font-family:'Space Mono',monospace}
.end-title{font-size:22px;font-weight:700;margin-bottom:8px}
.end-verdict{font-size:14px;color:var(--text2);line-height:1.8;padding:14px 16px;background:var(--surface2);border-radius:10px;border-left:3px solid var(--border2);margin-bottom:20px}
.debrief-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
.debrief-block{margin-bottom:10px;padding:14px 16px;background:var(--surface2);border-radius:12px;border-left:3px solid var(--border)}
.debrief-block.good{border-left-color:var(--green)}
.debrief-block.bad{border-left-color:var(--red)}
.debrief-block.mid{border-left-color:var(--amber)}
.debrief-num{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;font-family:'Space Mono',monospace}
.debrief-choice{font-size:12px;color:var(--text3);margin-bottom:5px;font-style:italic}
.debrief-comment{font-size:13px;color:var(--text);line-height:1.7;font-weight:500}
.btn-row{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.btn{padding:13px 20px;font-size:13px;font-weight:600;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.btn:hover{background:#fff;border-color:var(--blue);color:var(--blue);box-shadow:0 4px 12px rgba(36,113,163,0.1)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:#1A5276;border-color:#1A5276;color:#fff}
.btn-back{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:6px 0;margin-bottom:10px;display:flex;align-items:center;gap:4px;font-weight:500}
.btn-back:hover{color:var(--text)}
.footer{text-align:center;padding:20px 0 8px;font-size:11px;color:var(--text3)}
@media(max-width:420px){.role-grid{grid-template-columns:1fr}.btn-row{flex-direction:column}.btn{width:100%;text-align:center}}
.ai-zone{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:14px;box-shadow:var(--shadow)}
.ai-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s infinite}
.ai-messages{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:280px;overflow-y:auto}
.ai-messages::-webkit-scrollbar{width:3px}
.ai-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg{padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.7;max-width:92%}
.msg.user{background:var(--blue);color:#fff;align-self:flex-end;border-radius:12px 12px 4px 12px}
.msg.assistant{background:var(--surface2);color:var(--text);align-self:flex-start;border-radius:12px 12px 12px 4px;border:1px solid var(--border)}
.msg.loading{color:var(--text3);font-style:italic}
.ai-input-row{display:flex;gap:8px}
.ai-input{flex:1;padding:12px 14px;font-size:13px;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);outline:none;transition:border-color 0.15s}
.ai-input:focus{border-color:var(--blue)}
.ai-send{padding:12px 18px;font-size:13px;font-weight:600;border-radius:10px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.ai-send:hover{background:#1A5276}
.ai-send:disabled{opacity:0.5;cursor:default}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-badge"><span class="brand-dot"></span>PROTOTYPE v2</div>
    <div class="brand-title">BLACK<span>BOX</span><br>HOSPITAL</div>
    <div class="brand-sub">Simulateur de crise hospitalière</div>
  </div>
  <div class="status-bar">
    <div class="status-left">
      <div class="status-role" id="role-label">Choisissez votre rôle</div>
      <div class="status-scenario" id="scen-label">—</div>
    </div>
    <div class="status-clock" id="clock">--:--</div>
  </div>
  <div id="main-zone"></div>
  <div class="footer">BlackBox Hospital · Prototype 2026 · Basé sur procédures HCL réelles</div>
</div>
<script>
const G={role:null,scenario:null,j1:80,j2:90,j3:70,j4:35,heure:4,minute:17,step:0};
let currentSteps=[],selectedChoices=[];

const ROLES={
  dsi:{name:'DSI',icon:'💻',desc:'Directeur des systèmes d\'information. Décisions techniques et arbitrages sous pression.'},
  ide:{name:'Infirmière coordinatrice',icon:'🩺',desc:'Coordination soins aux urgences. Gestion des humains et des flux en situation critique.'},
  cadre:{name:'Cadre de santé (nuit)',icon:'🌙',desc:'Garde de nuit — vous supervisez plusieurs unités. Seul décideur terrain entre minuit et 6h.'},
  dpo:{name:'DPO / Conformité RGPD',icon:'🔒',desc:'Responsable protection des données. Violation détectée — CNIL à notifier sous 72h.'},
  brancardier:{name:'Régulateur STIP',icon:'🚑',desc:'Coordination du brancardage. Panne du logiciel PTAH — 14 transports patients à gérer sur papier.'}
};

function mkS(tag,tc,txt,cs){return{tag,tagClass:tc,text:txt,choices:cs};}
function mkC(l,e,log,q,qi){return{l,e,log,q,qi};}

const SCENARIOS={
  ransomware:{
    name:'Cyberattaque ransomware',sub:'Chiffrement des serveurs — nuit',tag:'CRITIQUE',tagClass:'tag-red',
    startLog:[{t:'alert',m:'ALERTE — Chiffrement détecté sur 3 serveurs principaux.'},{t:'warn',m:'DossierPatient.exe inaccessible. Bloc opératoire en panne.'},{t:'info',m:'Vous êtes de garde. Le RSSI ne répond pas.'}],
    gaugeLabels:['Réseau','Patients OK','Moral équipe','Pression DG'],
    steps:{
      dsi:[
        mkS('DÉCISION 1/4','tag-red',"La directrice des soins appelle :\n«Bloc opératoire bloqué — dossiers anesthésiques inaccessibles. 2 interventions dans 45 minutes.»\n\nQue faites-vous en premier ?",[
          mkC("Couper tout le réseau immédiatement pour stopper la propagation",{j1:+15,j2:-18,j3:-8,j4:+20},[{t:'warn',m:'Réseau coupé. Propagation stoppée. Bloc en mode dégradé.'},{t:'alert',m:'2 interventions reportées.'}],"Décision radicale mais efficace. Coût humain immédiat.",2),
          mkC("Isoler uniquement le segment bloc opératoire",{j1:-10,j2:-5,j3:+5,j4:+10},[{t:'warn',m:'Isolation partielle. Risque propagation présent.'}],"Compromis raisonnable. Risque résiduel réel.",1),
          mkC("Ne rien couper, chercher d'abord l'origine",{j1:-25,j2:-12,j3:-5,j4:+15},[{t:'alert',m:'4 serveurs supplémentaires chiffrés.'},{t:'alert',m:'Biologie et imagerie tombent.'}],"Erreur classique : l'analyse prend du temps, l'attaque non.",0)
        ]),
        mkS('DÉCISION 2/4','tag-red',"SAMU : 3 urgences vitales en route. Communication via logiciel HS.\n\nLe médecin de garde demande si les urgences peuvent recevoir sans informatique.",[
          mkC("Oui, mode dégradé validé. J'envoie un technicien aux urgences.",{j1:0,j2:+8,j3:+10,j4:-5},[{t:'ok',m:'Protocole papier activé. 3 patients accueillis avec succès.'}],"Bonne décision dans votre périmètre, sans escalade inutile.",2),
          mkC("Je rappelle dans 10 minutes, j'attends le point réseau.",{j1:+5,j2:-15,j3:-12,j4:+25},[{t:'alert',m:'SAMU furieux. DG réveillé. Incident noté.'}],"La pression technique ne justifie pas de retarder une urgence vitale.",0),
          mkC("Je contacte le DG pour qu'il prenne la décision.",{j1:0,j2:-5,j3:-8,j4:+30},[{t:'warn',m:'DG réveillé à 4h30. Décision avec 8 min de retard.'}],"Escalade inutile : cette décision était dans votre périmètre.",0)
        ]),
        mkS('DÉCISION 3/4','tag-amber',"Un journaliste tweete : «CHU victime cyberattaque majeure. Patients en danger ?»\n\nLe DG vous demande un communiqué immédiatement.",[
          mkC("Communiqué factuel : incident en cours, situation maîtrisée, aucun patient en danger",{j1:0,j2:+5,j3:+8,j4:-15},[{t:'ok',m:'Communiqué publié. Presse stabilisée. Soignants rassurés.'}],"Transparence factuelle : la bonne posture en crise cyber.",2),
          mkC("Aucun communiqué avant d'avoir tout sous contrôle.",{j1:0,j2:0,j3:-10,j4:+20},[{t:'warn',m:'Silence alimente les rumeurs. 3 médias reprennent le tweet.'}],"Le silence en crise est toujours interprété comme un aveu.",0),
          mkC("Communiqué vague : «maintenance technique en cours»",{j1:0,j2:0,j3:-5,j4:+10},[{t:'alert',m:'Un interne tweete une photo de salles HS. ARS appelle.'}],"Minimiser une crise réelle détruit la confiance durablement.",0)
        ]),
        mkS('DÉCISION 4/4','tag-blue',"6h15. Réseau partiellement restauré. ANSSI arrive dans 2 heures.\n\nReprise des activités programmées ou mode dégradé jusqu'à validation ?",[
          mkC("Mode dégradé jusqu'à validation ANSSI. Sécurité avant tout.",{j1:+10,j2:+5,j3:-5,j4:-10},[{t:'ok',m:'Décision prudente validée par l\'ANSSI. 5 opérations reportées.'}],"Décision conservatrice mais professionnellement irréprochable.",2),
          mkC("Reprendre progressivement avec supervision renforcée.",{j1:-5,j2:+10,j3:+10,j4:-5},[{t:'warn',m:'2 incidents mineurs contenus. ANSSI valide la gestion.'}],"Compromis acceptable si la supervision est vraiment renforcée.",1),
          mkC("Reprendre normalement. Les équipes ont besoin de routine.",{j1:-20,j2:-8,j3:+5,j4:+15},[{t:'alert',m:'Rechiffrement partiel à 7h30. ANSSI ouvre une investigation.'}],"Erreur grave : la routine ne remplace pas la validation sécurité.",0)
        ])
      ],
      ide:[
        mkS('DÉCISION 1/4','tag-red',"3h du matin. Réseau coupé sans prévenir.\nPlus d'accès aux dossiers. 14 patients en charge.\n\nVotre première action ?",[
          mkC("Imprimer en urgence les dernières ordonnances avant coupure totale",{j1:0,j2:+12,j3:+8,j4:-5},[{t:'ok',m:'Ordonnances imprimées. Réflexe salué par le médecin de garde.'}],"Réflexe terrain excellent : sécuriser les données critiques avant la coupure.",2),
          mkC("Appeler le DSI pour comprendre avant d'agir",{j1:0,j2:-5,j3:-5,j4:+10},[{t:'warn',m:'DSI injoignable 8 minutes. 2 patients sans suivi.'}],"L'attente d'information coûte du temps patient.",1),
          mkC("Continuer normalement de mémoire",{j1:0,j2:-15,j3:-10,j4:+15},[{t:'alert',m:'Erreur de dosage évitée de justesse. Incident déclaré.'}],"Travailler de mémoire sur des patients complexes est une prise de risque inacceptable.",0)
        ]),
        mkS('DÉCISION 2/4','tag-red',"4h15. Un patient agité sort dans le couloir.\nIl croit que l'hôpital est «piraté par des terroristes» (info WhatsApp).\n\nVous gérez comment ?",[
          mkC("Lui expliquer calmement la situation réelle et le raccompagner",{j1:0,j2:+10,j3:+5,j4:-5},[{t:'ok',m:'Patient calmé en 6 minutes. L\'équipe vous remercie.'}],"La désescalade prend du temps mais évite des incidents en cascade.",2),
          mkC("Demander à l'aide-soignant de le gérer",{j1:0,j2:-8,j3:-8,j4:+10},[{t:'warn',m:'AS débordé. Patient s\'énerve, appelle le 15.'}],"Déléguer sans cadrer surcharge l'équipe et aggrave la situation.",0),
          mkC("Appeler la sécurité immédiatement",{j1:0,j2:-5,j3:-12,j4:+8},[{t:'alert',m:'Intervention musclée. Ambiance dans le service se dégrade.'}],"Réponse disproportionnée qui traumatise les autres patients.",0)
        ]),
        mkS('DÉCISION 3/4','tag-amber',"5h30. Votre collègue IDE craque dans le couloir.\n«Je peux plus. J'ai fait 3 erreurs ce soir.»\nEncore 2h30 avant la relève.\n\nVous faites quoi ?",[
          mkC("La mettre en retrait sur les tâches complexes, alerter le cadre de nuit",{j1:0,j2:+8,j3:+12,j4:-8},[{t:'ok',m:'Collègue mise en sécurité. Réorganisation efficace.'}],"Protéger les patients ET la collègue : décision difficile mais professionnelle.",2),
          mkC("L'encourager, lui dire que ça va aller",{j1:0,j2:-10,j3:-5,j4:+5},[{t:'warn',m:'4ème erreur à 6h00. Presque un incident grave.'}],"L'encouragement ne suffit pas face à une détresse réelle.",1),
          mkC("La renvoyer chez elle, appeler le cadre pour un remplacement",{j1:0,j2:-5,j3:-15,j4:+12},[{t:'alert',m:'Toute l\'équipe témoin. Collègue dépose une main courante.'}],"Renvoyer sans soutien est perçu comme un abandon.",0)
        ]),
        mkS('DÉCISION 4/4','tag-blue',"7h00. La relève arrive. Compte-rendu de la nuit demandé.\nVous êtes épuisée. Incidents et erreurs évitées de justesse.\n\nVous dites quoi ?",[
          mkC("Compte-rendu complet et honnête",{j1:0,j2:+10,j3:+15,j4:-10},[{t:'ok',m:'Cadre prend les mesures. Votre honnêteté protège les patients du jour.'}],"La transparence post-crise est la base de l'amélioration continue.",2),
          mkC("Compte-rendu allégé : «ça a été compliqué mais on a géré»",{j1:0,j2:-5,j3:-5,j4:+5},[{t:'warn',m:'Cadre découvre un incident non signalé à 9h. Convocation.'}],"Minimiser retarde les mesures correctives nécessaires.",1),
          mkC("Signaler uniquement les incidents formalisés",{j1:0,j2:-8,j3:-10,j4:+8},[{t:'alert',m:'Patient du matin reçoit traitement sur infos incomplètes. Enquête.'}],"Ce qui n'est pas transmis devient un risque pour les patients suivants.",0)
        ])
      ],
      cadre:[
        mkS('DÉCISION 1/4','tag-red',"2h du matin. Le réseau vient de tomber.\nVous supervisez 4 unités avec 8 soignants de garde.\n\nPremière décision ?",[

function pad(n){return String(n).padStart(2,'0');}
function clamp(v){return Math.max(0,Math.min(100,Math.round(v)));}
function tick(){G.minute+=7;if(G.minute>=60){G.minute-=60;G.heure++;}if(G.heure>=24)G.heure-=24;const el=document.getElementById('clock');if(el)el.textContent=pad(G.heure)+':'+pad(G.minute);}

function updateGauges(){
  ['j1','j2','j3','j4'].forEach((k,i)=>{
    const gv=document.getElementById('gv-'+i);
    const gf=document.getElementById('gf-'+i);
    if(gv)gv.textContent=clamp(G[k])+'%';
    if(gf){gf.style.width=clamp(G[k])+'%';const colors=['#C0392B','#1E8449','#E67E22','#2471A3'];gf.style.background=colors[i];}
  });
}

function addLog(lines){
  const log=document.getElementById('log');if(!log)return;
  const h=pad(G.heure)+':'+pad(G.minute);
  lines.forEach(l=>{const d=document.createElement('div');d.className='log-line '+(l.t||'');d.textContent='['+h+'] '+l.m;log.appendChild(d);});
  log.scrollTop=log.scrollHeight;
}

function renderMain(html){document.getElementById('main-zone').innerHTML=html;}

function showRoleSelect(){
  G.role=null;G.scenario=null;G.step=0;selectedChoices=[];
  document.getElementById('role-label').textContent='Choisissez votre rôle';
  document.getElementById('scen-label').textContent='—';
  document.getElementById('clock').textContent='--:--';
  renderMain(`
    <div class="section-title">Votre rôle</div>
    <div class="role-grid">
      ${Object.entries(ROLES).map(([k,r])=>`
        <button class="role-card" onclick="selectRole('${k}')">
          <span class="role-icon">${r.icon}</span>
          <div class="role-name">${r.name}</div>
          <div class="role-desc">${r.desc}</div>
        </button>`).join('')}
    </div>
  `);
}

function selectRole(key){
  G.role=key;
  document.getElementById('role-label').textContent=ROLES[key].name;
  showScenarioSelect();
}

function getAvailableScenarios(role){
  return Object.entries(SCENARIOS).filter(([k,s])=>s.steps[role]||s.steps.dsi);
}

function showScenarioSelect(){
  const avail=getAvailableScenarios(G.role);
  renderMain(`
    <button class="btn-back" onclick="showRoleSelect()">← Changer de rôle</button>
    <div class="section-title">Choisissez votre scénario</div>
    <div class="scen-list">
      ${avail.map(([k,s])=>`
        <button class="scen-card" onclick="startScenario('${k}')">
          <div>
            <div class="scen-name">${s.name}</div>
            <div class="scen-sub">${s.sub}</div>
          </div>
          <span class="event-tag ${s.tagClass}">${s.tag}</span>
        </button>`).join('')}
    </div>
  `);
}

function startScenario(key){
  G.scenario=key;G.j1=80;G.j2=90;G.j3=70;G.j4=35;
  G.heure=4;G.minute=17;G.step=0;selectedChoices=[];
  const s=SCENARIOS[key];
  currentSteps=s.steps[G.role]||s.steps[Object.keys(s.steps)[0]];
  document.getElementById('scen-label').textContent=s.name;
  const labels=s.gaugeLabels||['J1','J2','J3','J4'];
  renderMain(`
    <div class="gauges">
      ${labels.map((l,i)=>`
        <div class="gauge">
          <div class="gauge-label">${l}</div>
          <div class="gauge-val" id="gv-${i}">--</div>
          <div class="gauge-track"><div class="gauge-fill" id="gf-${i}" style="width:0%"></div></div>
        </div>`).join('')}
    </div>
    <div class="log" id="log"></div>
    <div id="step-zone"></div>
  `);
  updateGauges();addLog(s.startLog);setTimeout(()=>showStep(),400);
}

function showStep(){
  if(G.step>=currentSteps.length){showEnd();return;}
  const s=currentSteps[G.step];
  const total=currentSteps.length;
  const prog=Array.from({length:total},(_,i)=>`<div class="prog-step ${i<G.step?'done':i===G.step?'current':''}"></div>`).join('');
  const letters=['A','B','C','D'];
  const zone=document.getElementById('step-zone');if(!zone)return;
  zone.innerHTML=`
    <div class="progress">${prog}</div>
    <div class="event-card">
      <div class="event-header"><span class="event-tag ${s.tagClass}">${s.tag}</span></div>
      <div class="event-text">${s.text}</div>
      <div class="choices">
        ${s.choices.map((c,i)=>`
          <button class="choice-btn" id="cb-${i}" onclick="applyChoice(${i})">
            <span class="choice-letter">${letters[i]}</span>${c.l}
          </button>`).join('')}
      </div>
    </div>`;
}

function applyChoice(idx){
  const s=currentSteps[G.step];const c=s.choices[idx];
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  selectedChoices.push({step:G.step,choice:idx,quality:c.q,label:c.l,qi:c.qi||1});
  Object.entries(c.e).forEach(([k,v])=>{G[k]=clamp(G[k]+v);});
  tick();updateGauges();addLog(c.log);G.step++;
  setTimeout(()=>{if(G.step>=currentSteps.length)showEnd();else showStep();},700);
}

function showEnd(){
  const keys=['j1','j2','j3','j4'];
  const weights=[0.25,0.35,0.25,0.15];
  let score=0;
  keys.forEach((k,i)=>{const val=(i===3)?100-G[k]:G[k];score+=clamp(val)*weights[i];});
  score=Math.round(score);
  let title,color,verdict,borderColor;
  if(score>=78){title='Crise maîtrisée';color='var(--green)';borderColor='var(--green-mid)';verdict='Vous avez navigué avec lucidité. Vos décisions ont protégé les patients et le collectif. Ce genre de gestionnaire se fait rare.';}
  else if(score>=55){title='Gestion acceptable — avec séquelles';color='var(--amber)';borderColor='var(--amber-mid)';verdict='L\'hôpital tient. Mais certaines décisions hésitantes ont laissé des traces. Un rapport d\'incident vous attend ce matin.';}
  else{title='Incident majeur — enquête ouverte';color='var(--red)';borderColor='var(--red-mid)';verdict='La crise a débordé le cadre. Patients impactés, équipe abimée, hiérarchie en colère. Ce n\'est pas la fin — mais c\'est une cicatrice.';}
  const qiClass=['bad','mid','good'];
  const debriefs=selectedChoices.map((d,i)=>`
    <div class="debrief-block ${qiClass[d.qi]||'mid'}">
      <div class="debrief-num">Décision ${i+1}</div>
      <div class="debrief-choice">${d.label.substring(0,60)}${d.label.length>60?'...':''}</div>
      <div class="debrief-comment">${d.quality}</div>
    </div>`).join('');
  const zone=document.getElementById('step-zone');if(!zone)return;
  zone.innerHTML=`
    <div class="end-card">
      <div class="end-title" style="color:${color}">${title}</div>
      <div class="end-score-wrap">
        <div class="end-score" style="color:${color}">${score}</div>
        <div class="end-score-sub">/100</div>
      </div>
      <div class="end-verdict" style="border-left-color:${borderColor}">${verdict}</div>
      <div class="debrief-title">Analyse de vos décisions</div>
      ${debriefs}
      <div class="btn-row">
        <button class="btn primary" onclick="startScenario('${G.scenario}')">Rejouer</button>
        <button class="btn" onclick="showScenarioSelect()">Autre scénario</button>
        <button class="btn" onclick="showRoleSelect()">Changer de rôle</button>
      </div>
    </div>`;
}


// ===== API CLAUDE =====
const API_KEY = 'hHXxT0amI3Q0xpcwrWvhM8V9dfhRGkiH';
let chatHistory = [];

function buildSystemPrompt(){
  const s = SCENARIOS[G.scenario];
  const r = ROLES[G.role];
  const decisions = selectedChoices.map((d,i)=>
    `Décision ${i+1} : "${d.label}" — Qualité : ${['Mauvaise','Correcte avec réserves','Bonne'][d.qi]}`
  ).join('\n');
  return `Tu es un expert en gestion de crise hospitalière et formateur senior. 
Tu accompagnes un professionnel de santé qui vient de jouer une simulation BlackBox Hospital.

Contexte de la partie :
- Rôle joué : ${r.name}
- Scénario : ${s.name}
- Score obtenu : ${Math.round(
    (['j1','j2','j3','j4'].reduce((acc,k,i)=>{
      const v=i===3?100-G[k]:G[k];
      return acc+v*[0.25,0.35,0.25,0.15][i];
    },0))
  )}/100

Décisions prises :
${decisions}

Ton rôle : répondre aux questions du joueur sur ses décisions, sur les bonnes pratiques hospitalières, sur les procédures réelles. 
Sois précis, pédagogique, ancré dans la réalité du terrain hospitalier français.
Réponds en français, de façon directe et professionnelle. Maximum 150 mots par réponse.`;
}

async function sendMessage(){
  const input = document.getElementById('ai-input');
  const btn = document.getElementById('ai-send');
  const messages = document.getElementById('ai-messages');
  const text = input.value.trim();
  if(!text) return;

  // Message utilisateur
  input.value = '';
  btn.disabled = true;
  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.textContent = text;
  messages.appendChild(userMsg);

  // Message chargement
  const loadMsg = document.createElement('div');
  loadMsg.className = 'msg assistant loading';
  loadMsg.textContent = 'Claude analyse votre question...';
  messages.appendChild(loadMsg);
  messages.scrollTop = messages.scrollHeight;

  chatHistory.push({role:'user', content:text});

  try {
    const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: 'mistral-small-latest',
        max_tokens: 300,
        messages: [{role:'system', content:buildSystemPrompt()}, ...chatHistory]
      })
    });
    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || 'Désolé, je n\'ai pas pu répondre.';
    chatHistory.push({role:'assistant', content:reply});
    loadMsg.className = 'msg assistant';
    loadMsg.textContent = reply;
  } catch(e) {
    loadMsg.className = 'msg assistant';
    loadMsg.textContent = 'Erreur de connexion. Vérifiez votre connexion internet.';
  }

  btn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function showAIChat(){
  chatHistory = [];
  const s = SCENARIOS[G.scenario];
  const zone = document.getElementById('ai-zone');
  if(!zone) return;
  zone.innerHTML = `
    <div class="ai-title"><span class="ai-dot"></span>Tuteur IA — Posez vos questions</div>
    <div class="ai-messages" id="ai-messages">
      <div class="msg assistant">Bonjour ! Je connais votre partie — rôle ${ROLES[G.role].name}, scénario "${s.name}". Posez-moi vos questions sur vos décisions ou sur les bonnes pratiques hospitalières.</div>
    </div>
    <div class="ai-input-row">
      <input class="ai-input" id="ai-input" type="text" placeholder="Ex : Pourquoi ma décision 2 était risquée ?" onkeydown="handleKey(event)">
      <button class="ai-send" id="ai-send" onclick="sendMessage()">Envoyer</button>
    </div>`;
}
