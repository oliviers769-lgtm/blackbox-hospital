<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BlackBox Hospital — Simulateur de crise</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0392B;--red-light:#FDECEA;--red-mid:#F5B7B1;
  --amber:#E67E22;--amber-light:#FEF5EC;--amber-mid:#FAD7A0;
  --blue:#2471A3;--blue-light:#EBF5FB;--blue-mid:#A9CCE3;
  --green:#1E8449;--green-light:#EAFAF1;--green-mid:#A9DFBF;
  --bg:#F4F6F8;--surface:#FFFFFF;--surface2:#F8F9FA;
  --border:#E0E4E8;--border2:#C8CDD4;
  --text:#1A1D23;--text2:#4A5568;--text3:#8898AA;
  --shadow:0 2px 8px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:16px}

.wrap{max-width:680px;margin:0 auto}

/* BRAND */
.brand{text-align:center;padding:24px 0 20px}
.brand-badge{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;padding:6px 16px;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.08em;margin-bottom:14px}
.brand-dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.brand-title{font-family:'Space Mono',monospace;font-size:clamp(26px,5vw,40px);font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1.1;margin-bottom:6px}
.brand-title span{color:var(--red)}
.brand-sub{font-size:14px;color:var(--text3);font-weight:400}

/* STATUS BAR */
.status-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;box-shadow:var(--shadow)}
.status-left{display:flex;flex-direction:column;gap:2px}
.status-role{font-size:13px;font-weight:600;color:var(--text)}
.status-scenario{font-size:12px;color:var(--text3)}
.status-clock{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--red)}

/* GAUGES */
.gauges{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:500px){.gauges{grid-template-columns:repeat(4,1fr)}}
.gauge{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.gauge-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.gauge-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px}
.gauge-track{height:5px;background:var(--border);border-radius:3px}
.gauge-fill{height:5px;border-radius:3px;transition:width 0.6s ease}

/* LOG */
.log{background:var(--text);border-radius:12px;padding:16px;margin-bottom:14px;min-height:100px;max-height:140px;overflow-y:auto;box-shadow:var(--shadow-lg)}
.log::-webkit-scrollbar{width:3px}
.log::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
.log-line{font-family:'Space Mono',monospace;font-size:11px;line-height:2;color:#8898AA}
.log-line.alert{color:#E74C3C}
.log-line.warn{color:#F39C12}
.log-line.ok{color:#27AE60}
.log-line.info{color:#3498DB}

/* PROGRESS */
.progress{display:flex;gap:5px;margin-bottom:12px}
.prog-step{height:5px;flex:1;border-radius:3px;background:var(--border)}
.prog-step.done{background:var(--blue)}
.prog-step.current{background:var(--red)}

/* EVENT CARD */
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.event-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.event-tag{font-size:11px;font-weight:700;padding:5px 12px;border-radius:100px;letter-spacing:0.06em;font-family:'Space Mono',monospace}
.tag-red{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid)}
.tag-amber{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-mid)}
.tag-blue{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-mid)}
.event-text{font-size:15px;color:var(--text);line-height:1.8;margin-bottom:20px;white-space:pre-line;font-weight:400}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{text-align:left;padding:16px 18px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);cursor:pointer;line-height:1.6;transition:all 0.18s;position:relative}
.choice-btn:hover:not(:disabled){background:#fff;border-color:var(--blue);color:var(--text);box-shadow:0 4px 16px rgba(36,113,163,0.12);transform:translateY(-1px)}
.choice-btn:active:not(:disabled){transform:translateY(0)}
.choice-btn:disabled{opacity:0.4;cursor:default;transform:none}
.choice-letter{display:inline-block;width:26px;height:26px;border-radius:8px;background:var(--border);text-align:center;line-height:26px;font-size:12px;font-weight:700;margin-right:10px;font-family:'Space Mono',monospace;vertical-align:middle;flex-shrink:0}

/* ROLE SELECT */
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.role-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;text-align:left;transition:all 0.18s;box-shadow:var(--shadow)}
.role-card:hover{border-color:var(--blue);box-shadow:0 8px 24px rgba(36,113,163,0.14);transform:translateY(-2px)}
.role-card:active{transform:translateY(0)}
.role-icon{font-size:28px;margin-bottom:10px;display:block}
.role-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.role-desc{font-size:12px;color:var(--text3);line-height:1.5}

/* SCENARIO SELECT */
.scen-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.scen-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:all 0.18s;box-shadow:var(--shadow)}
.scen-card:hover{border-color:var(--blue);box-shadow:0 6px 20px rgba(36,113,163,0.12);transform:translateY(-1px)}
.scen-card:active{transform:translateY(0)}
.scen-name{font-size:15px;font-weight:600;color:var(--text)}
.scen-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* END */
.end-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:var(--shadow-lg)}
.end-score-wrap{display:flex;align-items:flex-end;gap:8px;margin:16px 0}
.end-score{font-family:'Space Mono',monospace;font-size:56px;font-weight:700;line-height:1}
.end-score-sub{font-size:18px;color:var(--text3);margin-bottom:8px;font-family:'Space Mono',monospace}
.end-title{font-size:22px;font-weight:700;margin-bottom:8px}
.end-verdict{font-size:14px;color:var(--text2);line-height:1.8;padding:14px 16px;background:var(--surface2);border-radius:10px;border-left:3px solid var(--border2);margin-bottom:20px}
.debrief-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
.debrief-block{margin-bottom:10px;padding:14px 16px;background:var(--surface2);border-radius:12px;border-left:3px solid var(--border)}
.debrief-block.good{border-left-color:var(--green)}
.debrief-block.bad{border-left-color:var(--red)}
.debrief-block.mid{border-left-color:var(--amber)}
.debrief-num{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;font-family:'Space Mono',monospace}
.debrief-choice{font-size:12px;color:var(--text3);margin-bottom:5px;font-style:italic}
.debrief-comment{font-size:13px;color:var(--text);line-height:1.7;font-weight:500}
.btn-row{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.btn{padding:13px 20px;font-size:13px;font-weight:600;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.btn:hover{background:#fff;border-color:var(--blue);color:var(--blue);box-shadow:0 4px 12px rgba(36,113,163,0.1)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:#1A5276;border-color:#1A5276;color:#fff}
.btn-back{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:6px 0;margin-bottom:10px;display:flex;align-items:center;gap:4px;font-weight:500}
.btn-back:hover{color:var(--text)}

/* FEEDBACK FLASH */
.feedback{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:10px;line-height:1.5;display:none}
.feedback.show{display:block}
.feedback.good{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}
.feedback.bad{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid)}
.feedback.mid{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-mid)}

.footer{text-align:center;padding:20px 0 8px;font-size:11px;color:var(--text3)}

@media(max-width:420px){
  .role-grid{grid-template-columns:1fr}
  .btn-row{flex-direction:column}
  .btn{width:100%;text-align:center}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-badge"><span class="brand-dot"></span>PROTOTYPE v1</div>
    <div class="brand-title">BLACK<span>BOX</span><br>HOSPITAL</div>
    <div class="brand-sub">Simulateur de crise hospitalière</div>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div class="status-role" id="role-label">Choisissez votre rôle</div>
      <div class="status-scenario" id="scen-label">—</div>
    </div>
    <div class="status-clock" id="clock">--:--</div>
  </div>

  <div id="main-zone"></div>

  <div class="footer">BlackBox Hospital · Prototype 2026 · Tous droits réservés</div>
</div>

<script>
const G={role:null,scenario:null,reseau:80,patients:90,moral:70,pression:35,heure:4,minute:17,step:0};
let currentSteps=[],selectedChoices=[];

const ROLES={
  dsi:{name:'DSI',icon:'💻',desc:'Directeur des systèmes d\'information. Décisions techniques et arbitrages sous pression.'},
  ide:{name:'Infirmière coordinatrice',icon:'🩺',desc:'Coordination soins aux urgences. Gestion des humains et des flux en situation critique.'}
};

const SCENARIOS={
  ransomware:{
    name:'Cyberattaque ransomware',sub:'Chiffrement des serveurs — nuit',tag:'CRITIQUE',tagClass:'tag-red',
    startLog:[
      {t:'alert',m:'ALERTE — Chiffrement détecté sur 3 serveurs principaux.'},
      {t:'warn',m:'DossierPatient.exe inaccessible. Bloc opératoire signale panne.'},
      {t:'info',m:'Vous êtes de garde. Le RSSI ne répond pas.'},
    ],
    gaugeLabels:['Réseau','Patients OK','Moral équipe','Pression DG'],
    steps:{
      dsi:[
        {tag:'DÉCISION 1/4',tagClass:'tag-red',text:"La directrice des soins appelle :\n«Le bloc opératoire est bloqué — dossiers anesthésiques inaccessibles. 2 interventions dans 45 minutes.»\n\nQue faites-vous en premier ?",
         choices:[
           {l:"Couper tout le réseau immédiatement pour stopper la propagation",e:{reseau:+15,patients:-18,moral:-8,pression:+20},log:[{t:'warn',m:'Réseau coupé. Propagation stoppée. Bloc en mode dégradé.'},{t:'alert',m:'2 interventions reportées. Familles informées.'}],q:"Décision radicale mais efficace sur la propagation. Coût humain immédiat.",qi:2},
           {l:"Isoler uniquement le segment bloc opératoire, maintenir le reste",e:{reseau:-10,patients:-5,moral:+5,pression:+10},log:[{t:'warn',m:'Isolation partielle. Risque propagation présent.'},{t:'info',m:'Bloc partiellement stable. RSSI toujours injoignable.'}],q:"Compromis raisonnable. Risque résiduel réel.",qi:1},
           {l:"Ne rien couper, chercher d'abord l'origine",e:{reseau:-25,patients:-12,moral:-5,pression:+15},log:[{t:'alert',m:'4 serveurs supplémentaires chiffrés pendant l\'analyse.'},{t:'alert',m:'Biologie et imagerie tombent.'}],q:"Erreur classique : l'analyse prend du temps, l'attaque non.",qi:0},
         ]},
        {tag:'DÉCISION 2/4',tagClass:'tag-red',text:"Le SAMU : 3 urgences vitales en route. Communication via logiciel HS.\n\nLe médecin de garde demande si les urgences peuvent recevoir sans informatique.",
         choices:[
           {l:"Oui, mode dégradé validé. J'envoie un technicien aux urgences.",e:{reseau:0,patients:+8,moral:+10,pression:-5},log:[{t:'ok',m:'Technicien dépêché. Protocole papier activé.'},{t:'ok',m:'3 patients accueillis avec succès.'}],q:"Bonne décision : vous avez agi dans votre périmètre sans escalader inutilement.",qi:2},
           {l:"Je rappelle dans 10 minutes, j'attends le point réseau d'abord.",e:{reseau:+5,patients:-15,moral:-12,pression:+25},log:[{t:'alert',m:'SAMU furieux. Délai sur urgences vitales signalé.'},{t:'alert',m:'DG réveillé. Incident noté.'}],q:"La pression technique ne justifie pas de retarder une urgence vitale.",qi:0},
           {l:"Je contacte le DG pour qu'il prenne la décision.",e:{reseau:0,patients:-5,moral:-8,pression:+30},log:[{t:'warn',m:'DG réveillé à 4h30. Très mécontent.'},{t:'warn',m:'Décision prise avec 8 min de retard.'}],q:"Escalade inutile : cette décision était dans votre périmètre.",qi:0},
         ]},
        {tag:'DÉCISION 3/4',tagClass:'tag-amber',text:"Un journaliste tweete : «Source interne : CHU victime cyberattaque majeure. Patients en danger ?»\n\nLe DG vous demande un communiqué immédiatement.",
         choices:[
           {l:"Communiqué factuel : incident en cours, situation maîtrisée, aucun patient en danger",e:{reseau:0,patients:+5,moral:+8,pression:-15},log:[{t:'ok',m:'Communiqué publié. Presse stabilisée.'},{t:'ok',m:'Soignants soulagés d\'avoir une communication claire.'}],q:"Transparence factuelle : la bonne posture en crise cyber.",qi:2},
           {l:"Aucun communiqué avant d'avoir tout sous contrôle.",e:{reseau:0,patients:0,moral:-10,pression:+20},log:[{t:'warn',m:'Silence alimente les rumeurs. 3 médias reprennent le tweet.'},{t:'warn',m:'Personnel inquiet.'}],q:"Le silence en crise est toujours interprété comme un aveu ou une incompétence.",qi:0},
           {l:"Communiqué vague : «maintenance technique en cours»",e:{reseau:0,patients:0,moral:-5,pression:+10},log:[{t:'alert',m:'Un interne tweete une photo de salles HS.'},{t:'alert',m:'ARS appelle. Communication mensongère retournée contre vous.'}],q:"Minimiser une crise réelle détruit la confiance durablement.",qi:0},
         ]},
        {tag:'DÉCISION 4/4',tagClass:'tag-blue',text:"Il est 6h15. Réseau partiellement restauré. L'ANSSI arrive dans 2 heures.\n\nReprise des activités programmées ce matin ou mode dégradé jusqu'à validation ?",
         choices:[
           {l:"Mode dégradé jusqu'à validation ANSSI. Sécurité avant tout.",e:{reseau:+10,patients:+5,moral:-5,pression:-10},log:[{t:'ok',m:'Décision prudente validée par l\'ANSSI.'},{t:'ok',m:'5 opérations reportées. Aucun incident supplémentaire.'}],q:"Décision conservatrice mais professionnellement irréprochable.",qi:2},
           {l:"Reprendre progressivement avec supervision renforcée.",e:{reseau:-5,patients:+10,moral:+10,pression:-5},log:[{t:'warn',m:'2 incidents mineurs détectés et contenus.'},{t:'ok',m:'L\'ANSSI valide la gestion globale.'}],q:"Compromis acceptable si la supervision est vraiment renforcée.",qi:1},
           {l:"Reprendre normalement. Les équipes ont besoin de revenir à la routine.",e:{reseau:-20,patients:-8,moral:+5,pression:+15},log:[{t:'alert',m:'Rechiffrement partiel détecté à 7h30.'},{t:'alert',m:'L\'ANSSI ouvre une investigation.'}],q:"Erreur grave : la routine ne remplace pas la validation sécurité.",qi:0},
         ]},
      ],
      ide:[
        {tag:'DÉCISION 1/4',tagClass:'tag-red',text:"3h du matin. L'informatique vient de couper le réseau sans prévenir.\nPlus d'accès aux dossiers patients. Vous avez 14 patients en charge.\n\nVotre première action ?",
         choices:[
           {l:"Imprimer en urgence les dernières ordonnances avant la coupure totale",e:{reseau:0,patients:+12,moral:+8,pression:-5},log:[{t:'ok',m:'Ordonnances imprimées. L\'équipe a les infos clés.'},{t:'ok',m:'Réflexe salué par le médecin de garde.'}],q:"Réflexe terrain excellent : sécuriser les données critiques avant la coupure totale.",qi:2},
           {l:"Appeler le DSI pour comprendre avant d'agir",e:{reseau:0,patients:-5,moral:-5,pression:+10},log:[{t:'warn',m:'DSI injoignable pendant 8 minutes.'},{t:'warn',m:'2 patients sans suivi.'}],q:"L'attente d'information coûte du temps patient.",qi:1},
           {l:"Continuer normalement de mémoire, sans les dossiers",e:{reseau:0,patients:-15,moral:-10,pression:+15},log:[{t:'alert',m:'Erreur de dosage évitée de justesse.'},{t:'alert',m:'Incident déclaré. Médecin furieux.'}],q:"Travailler de mémoire sur des patients complexes est une prise de risque inacceptable.",qi:0},
         ]},
        {tag:'DÉCISION 2/4',tagClass:'tag-red',text:"4h15. Un patient agité sort dans le couloir en criant que l'hôpital est «piraté par des terroristes».\nIl a appris la cyberattaque par sa famille via WhatsApp.\n\nVous gérez comment ?",
         choices:[
           {l:"Lui expliquer calmement la situation réelle et le raccompagner",e:{reseau:0,patients:+10,moral:+5,pression:-5},log:[{t:'ok',m:'Patient calmé en 6 minutes.'},{t:'ok',m:'L\'équipe vous remercie.'}],q:"La désescalade prend du temps mais évite des incidents en cascade.",qi:2},
           {l:"Demander à l'aide-soignant de le gérer",e:{reseau:0,patients:-8,moral:-8,pression:+10},log:[{t:'warn',m:'AS débordé. Patient s\'énerve, appelle le 15.'},{t:'warn',m:'Mauvaise pub.'}],q:"Déléguer sans cadrer surcharge l'équipe et aggrave la situation.",qi:0},
           {l:"Appeler la sécurité immédiatement",e:{reseau:0,patients:-5,moral:-12,pression:+8},log:[{t:'warn',m:'Intervention musclée. Autres patients témoins.'},{t:'alert',m:'Ambiance dans le service se dégrade.'}],q:"Réponse disproportionnée qui traumatise les autres patients et l'équipe.",qi:0},
         ]},
        {tag:'DÉCISION 3/4',tagClass:'tag-amber',text:"5h30. Votre collègue IDE craque dans le couloir.\n«Je peux plus. J'ai fait 3 erreurs ce soir, je sais même plus ce que je fais.»\nEncore 2h30 avant la relève.\n\nVous faites quoi ?",
         choices:[
           {l:"La mettre en retrait sur les tâches complexes, alerter le cadre de nuit",e:{reseau:0,patients:+8,moral:+12,pression:-8},log:[{t:'ok',m:'Collègue mise en sécurité. Cadre informé.'},{t:'ok',m:'Réorganisation efficace jusqu\'à la relève.'}],q:"Protéger les patients ET la collègue : décision difficile mais professionnelle.",qi:2},
           {l:"L'encourager, lui dire que ça va aller, continuer ensemble",e:{reseau:0,patients:-10,moral:-5,pression:+5},log:[{t:'warn',m:'4ème erreur à 6h00. Presque un incident grave.'},{t:'warn',m:'La collègue s\'effondre à la relève.'}],q:"L'encouragement ne suffit pas face à une détresse réelle.",qi:1},
           {l:"La renvoyer chez elle, appeler le cadre pour un remplacement",e:{reseau:0,patients:-5,moral:-15,pression:+12},log:[{t:'alert',m:'Toute l\'équipe témoin. Défiance généralisée.'},{t:'alert',m:'Collègue dépose une main courante le lendemain.'}],q:"Renvoyer sans soutien est perçu comme un abandon. Conséquences RH graves.",qi:0},
         ]},
        {tag:'DÉCISION 4/4',tagClass:'tag-blue',text:"7h00. La relève arrive. Le cadre de jour demande un compte-rendu de la nuit.\nVous êtes épuisée. Il y a eu des incidents, des erreurs évitées de justesse.\n\nVous dites quoi ?",
         choices:[
           {l:"Compte-rendu complet et honnête : incidents, décisions, état de l'équipe",e:{reseau:0,patients:+10,moral:+15,pression:-10},log:[{t:'ok',m:'Cadre prend les mesures nécessaires.'},{t:'ok',m:'Votre honnêteté protège les patients du jour.'}],q:"La transparence post-crise est la base de l'amélioration continue.",qi:2},
           {l:"Compte-rendu allégé : «ça a été compliqué mais on a géré»",e:{reseau:0,patients:-5,moral:-5,pression:+5},log:[{t:'warn',m:'Cadre découvre un incident non signalé à 9h.'},{t:'warn',m:'Vous êtes convoquée.'}],q:"Minimiser retarde les mesures correctives nécessaires.",qi:1},
           {l:"Signaler uniquement les incidents formalisés, rien d'autre",e:{reseau:0,patients:-8,moral:-10,pression:+8},log:[{t:'alert',m:'Patient du matin reçoit un traitement sur infos incomplètes.'},{t:'alert',m:'Incident iatrogène. Enquête interne.'}],q:"Ce qui n'est pas transmis devient un risque pour les patients suivants.",qi:0},
         ]},
      ]
    }
  },
  greve:{
    name:'Grève surprise aux urgences',sub:'60% du personnel absent',tag:'SOCIAL',tagClass:'tag-amber',
    startLog:[
      {t:'warn',m:'06h00 — Préavis de grève déposé hier soir. 60% du personnel absent.'},
      {t:'alert',m:'Urgences : 4 soignants pour 18 patients en attente.'},
      {t:'info',m:'DG en réunion de crise. Vous prenez les décisions terrain.'},
    ],
    gaugeLabels:['Capacité soins','Patients OK','Moral équipe','Tension sociale'],

function pad(n){return String(n).padStart(2,'0');}
function clamp(v){return Math.max(0,Math.min(100,Math.round(v)));}
function tick(){G.minute+=7;if(G.minute>=60){G.minute-=60;G.heure++;}if(G.heure>=24)G.heure-=24;const el=document.getElementById('clock');if(el)el.textContent=pad(G.heure)+':'+pad(G.minute);}

function updateGauges(){
  ['reseau','patients','moral','pression'].forEach((k,i)=>{
    const gv=document.getElementById('gv-'+i);
    const gf=document.getElementById('gf-'+i);
    if(gv)gv.textContent=clamp(G[k])+'%';
    if(gf){
      gf.style.width=clamp(G[k])+'%';
      const colors=['#C0392B','#1E8449','#E67E22','#2471A3'];
      gf.style.background=colors[i];
    }
  });
}

function addLog(lines){
  const log=document.getElementById('log');if(!log)return;
  const h=pad(G.heure)+':'+pad(G.minute);
  lines.forEach(l=>{const d=document.createElement('div');d.className='log-line '+(l.t||'');d.textContent='['+h+'] '+l.m;log.appendChild(d);});
  log.scrollTop=log.scrollHeight;
}

function renderMain(html){document.getElementById('main-zone').innerHTML=html;}

function showRoleSelect(){
  G.role=null;G.scenario=null;G.step=0;selectedChoices=[];
  document.getElementById('role-label').textContent='Choisissez votre rôle';
  document.getElementById('scen-label').textContent='—';
  document.getElementById('clock').textContent='--:--';
  renderMain(`
    <div class="section-title">Votre rôle</div>
    <div class="role-grid">
      ${Object.entries(ROLES).map(([k,r])=>`
        <button class="role-card" onclick="selectRole('${k}')">
          <span class="role-icon">${r.icon}</span>
          <div class="role-name">${r.name}</div>
          <div class="role-desc">${r.desc}</div>
        </button>`).join('')}
    </div>
  `);
}

function selectRole(key){
  G.role=key;
  document.getElementById('role-label').textContent=ROLES[key].name;
  showScenarioSelect();
}

function showScenarioSelect(){
  renderMain(`
    <button class="btn-back" onclick="showRoleSelect()">← Changer de rôle</button>
    <div class="section-title">Choisissez votre scénario</div>
    <div class="scen-list">
      ${Object.entries(SCENARIOS).map(([k,s])=>`
        <button class="scen-card" onclick="startScenario('${k}')">
          <div>
            <div class="scen-name">${s.name}</div>
            <div class="scen-sub">${s.sub}</div>
          </div>
          <span class="event-tag ${s.tagClass}">${s.tag}</span>
        </button>`).join('')}
    </div>
  `);
}

function startScenario(key){

  G.heure=4;G.minute=17;G.step=0;selectedChoices=[];
  const s=SCENARIOS[key];
  currentSteps=s.steps[G.role]||s.steps.dsi;
  document.getElementById('scen-label').textContent=s.name;
  const labels=s.gaugeLabels||['Réseau','Patients OK','Moral équipe','Pression'];
  renderMain(`
    <div class="gauges">
      ${labels.map((l,i)=>`
        <div class="gauge">
          <div class="gauge-label">${l}</div>
          <div class="gauge-val" id="gv-${i}">--</div>
          <div class="gauge-track"><div class="gauge-fill" id="gf-${i}" style="width:0%"></div></div>
        </div>`).join('')}
    </div>
    <div class="log" id="log"></div>
    <div id="step-zone"></div>
  `);
  updateGauges();addLog(s.startLog);setTimeout(()=>showStep(),400);
}

function showStep(){
  if(G.step>=currentSteps.length){showEnd();return;}
  const s=currentSteps[G.step];
  const total=currentSteps.length;
  const prog=Array.from({length:total},(_,i)=>`<div class="prog-step ${i<G.step?'done':i===G.step?'current':''}"></div>`).join('');
  const letters=['A','B','C','D'];
  const zone=document.getElementById('step-zone');if(!zone)return;
  zone.innerHTML=`
    <div class="progress">${prog}</div>
    <div class="event-card">
      <div class="event-header"><span class="event-tag ${s.tagClass}">${s.tag}</span></div>
      <div class="event-text">${s.text}</div>
      <div class="choices">
        ${s.choices.map((c,i)=>`
          <button class="choice-btn" id="cb-${i}" onclick="applyChoice(${i})">
            <span class="choice-letter">${letters[i]}</span>${c.l}
          </button>`).join('')}
      </div>
    </div>`;
}

function applyChoice(idx){
  const s=currentSteps[G.step];const c=s.choices[idx];
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  selectedChoices.push({step:G.step,choice:idx,quality:c.q,label:c.l,qi:c.qi||1});
  Object.entries(c.e).forEach(([k,v])=>{G[k]=clamp(G[k]+v);});
  tick();updateGauges();addLog(c.log);G.step++;
  setTimeout(()=>{if(G.step>=currentSteps.length)showEnd();else showStep();},700);
}

function showEnd(){
  const keys=['reseau','patients','moral','pression'];
  const weights=[0.25,0.35,0.25,0.15];
  let score=0;
  keys.forEach((k,i)=>{const val=(k==='pression')?100-G[k]:G[k];score+=clamp(val)*weights[i];});
  score=Math.round(score);
  let title,color,verdict,borderColor;
  if(score>=78){
    title='Crise maîtrisée';color='var(--green)';borderColor='var(--green-mid)';
    verdict='Vous avez navigué avec lucidité. Vos décisions ont protégé les patients et le collectif. Ce genre de gestionnaire se fait rare.';
  }else if(score>=55){
    title='Gestion acceptable — avec séquelles';color='var(--amber)';borderColor='var(--amber-mid)';
    verdict='L\'hôpital tient. Mais certaines décisions hésitantes ont laissé des traces. Un rapport d\'incident vous attend ce matin.';
  }else{
    title='Incident majeur — enquête ouverte';color='var(--red)';borderColor='var(--red-mid)';
    verdict='La crise a débordé le cadre. Patients impactés, équipe abimée, hiérarchie en colère. Ce n\'est pas la fin — mais c\'est une cicatrice.';
  }
  const qiClass=['bad','mid','good'];
  const debriefs=selectedChoices.map((d,i)=>`
    <div class="debrief-block ${qiClass[d.qi]||'mid'}">
      <div class="debrief-num">Décision ${i+1}</div>
      <div class="debrief-choice">${d.label.substring(0,60)}${d.label.length>60?'...':''}</div>
      <div class="debrief-comment">${d.quality}</div>
    </div>`).join('');
  const zone=document.getElementById('step-zone');if(!zone)return;
  zone.innerHTML=`
    <div class="end-card">
      <div class="end-title" style="color:${color}">${title}</div>
      <div class="end-score-wrap">
        <div class="end-score" style="color:${color}">${score}</div>
        <div class="end-score-sub">/100</div>
      </div>
      <div class="end-verdict" style="border-left-color:${borderColor}">${verdict}</div>
      <div class="debrief-title">Analyse de vos décisions</div>
      ${debriefs}
      <div class="btn-row">
        <button class="btn primary" onclick="startScenario('${G.scenario}')">Rejouer</button>
        <button class="btn" onclick="showScenarioSelect()">Autre scénario</button>
        <button class="btn" onclick="showRoleSelect()">Changer de rôle</button>
      </div>
    </div>`;
}

showRoleSelect();
</script>
</body>
</html>
